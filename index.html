<!DOCTYPE html>
<html lang="ru" data-theme="system">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#F2F3F5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Календарь">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<title>Мой Календарь</title>
<script>
  // Тема до первой отрисовки — без мигания. Зеркалим в localStorage (IDB асинхронный).
  (function () {
    try {
      var t = localStorage.getItem('mc-theme') || 'system';
      document.documentElement.setAttribute('data-theme', t);
    } catch (e) {}
  })();
</script>
<style>
  /* Nunito — локальные файлы (без сети), вариативный шрифт wght 200-1000, разбит по подмножествам */
  @font-face { font-family: 'Nunito'; font-style: normal; font-weight: 200 1000; font-display: swap;
    src: url('fonts/nunito-cyrillic-ext.woff2') format('woff2');
    unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F; }
  @font-face { font-family: 'Nunito'; font-style: normal; font-weight: 200 1000; font-display: swap;
    src: url('fonts/nunito-cyrillic.woff2') format('woff2');
    unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116; }
  @font-face { font-family: 'Nunito'; font-style: normal; font-weight: 200 1000; font-display: swap;
    src: url('fonts/nunito-vietnamese.woff2') format('woff2');
    unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB; }
  @font-face { font-family: 'Nunito'; font-style: normal; font-weight: 200 1000; font-display: swap;
    src: url('fonts/nunito-latin-ext.woff2') format('woff2');
    unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF; }
  @font-face { font-family: 'Nunito'; font-style: normal; font-weight: 200 1000; font-display: swap;
    src: url('fonts/nunito-latin.woff2') format('woff2');
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD; }
  /* ============ Дизайн-система «Мастер-приёмщик» (графит + сигнальные цвета) ============ */
  :root {
    color-scheme: light;
    --bg: #F2F3F5; --surface: #FFFFFF; --surface-2: #E7E9EC; --border: #C7CBD1;
    --text: #15171A; --text-muted: #5B6168;
    --accent: #6789A8; --accent-soft: #E1EAF5;
    --success: #D97706; --warning: #D97706; --danger: #C13B30;
    --event: #DD8A4A;
    --shadow: 0 2px 6px rgba(15,17,20,.12);
    --cell-shadow: inset -9px -9px 12px -10px rgba(15,17,20,.22);
    --weekend-bg: #ECEDF0;
    --turn-bg: #FBECEA;
    --joint: #D37C3F;
    --work-green: #5E8A6B;
    --terracotta: #C97A5E;
    --r-card: 10px; --r-sheet: 16px; --r-chip: 6px;
    --font-display: "Nunito", "Segoe UI", system-ui, sans-serif;
    --font-ui: "Nunito", "Segoe UI", system-ui, -apple-system, Roboto, sans-serif;
    --font-mono: "Nunito", ui-monospace, "SF Mono", "Cascadia Mono", "Consolas", "Liberation Mono", monospace;
    --safe-b: env(safe-area-inset-bottom, 0px);
    --safe-t: env(safe-area-inset-top, 0px);
  }
  :root[data-theme="dark"] { color-scheme: dark;
    --bg: #121316; --surface: #1B1D21; --surface-2: #24262B; --border: #383B42;
    --text: #E7E9EC; --text-muted: #9AA0A8;
    --accent: #7698CA; --accent-soft: #1B2F45;
    --success: #E8A23C; --warning: #E8A23C; --danger: #E0584C;
    --event: #DD8A4A;
    --shadow: 0 2px 8px rgba(0,0,0,.5);
    --cell-shadow: inset -9px -9px 14px -10px rgba(0,0,0,.6);
    --weekend-bg: #202227;
    --turn-bg: #271C1B;
    --joint: #DB9357;
    --work-green: #7FAF8A;
    --terracotta: #D89478;
  }
  @media (prefers-color-scheme: dark) {
    :root[data-theme="system"] { color-scheme: dark;
      --bg: #121316; --surface: #1B1D21; --surface-2: #24262B; --border: #383B42;
      --text: #E7E9EC; --text-muted: #9AA0A8;
      --accent: #7698CA; --accent-soft: #1B2F45;
      --success: #E8A23C; --warning: #E8A23C; --danger: #E0584C;
      --event: #DD8A4A;
      --shadow: 0 2px 8px rgba(0,0,0,.5);
      --cell-shadow: inset -9px -9px 14px -10px rgba(0,0,0,.6);
      --weekend-bg: #202227;
      --turn-bg: #271C1B;
      --joint: #DB9357;
      --work-green: #7FAF8A;
      --terracotta: #D89478;
    }
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; overflow-x: hidden; }
  body {
    font-family: var(--font-ui);
    background: var(--bg); color: var(--text);
    font-size: 16px; line-height: 1.35;
    overscroll-behavior: contain;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
    min-height: 100vh;
  }
  .num { font-variant-numeric: tabular-nums; font-family: var(--font-mono); }
  button { font-family: inherit; color: inherit; cursor: pointer; border: none; background: none; }
  input, textarea, select { font-family: inherit; font-size: 16px; }

  /* ============ Каркас ============ */
  #app { max-width: 560px; margin: 0 auto; min-height: 100vh; padding-bottom: 105px; display: flex; flex-direction: column; }

  header.topbar {
    position: sticky; top: 0; z-index: 30;
    padding: calc(var(--safe-t) + 12px) 16px 12px;
    display: flex; align-items: center; gap: 8px;
    background: color-mix(in srgb, var(--bg) 78%, transparent);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .month-title { flex: 1; pointer-events: none;
    text-align: center; font-family: var(--font-display); font-weight: 700; font-size: 22px; letter-spacing: .5px; text-transform: uppercase; }
  .month-title small { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); font-family: var(--font-ui); text-transform: none; letter-spacing: 0; }
  .iconbtn { width: 44px; height: 44px; border-radius: 10px; display: grid; place-items: center; color: var(--text); }
  .iconbtn:active { background: var(--surface-2); }
  .iconbtn.sm { width: 40px; height: 40px; }
  svg { display: block; }

  /* ============ Сетка месяца ============ */
  .weekdays { display: grid; grid-template-columns: repeat(7,1fr); margin: 8px 12px 0; }
  .weekdays span { text-align: center; font-size: 13px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .4px; padding: 4px 0; }
  .weekdays span.we { font-size: 14px; font-weight: 800; color: var(--text); }

  .grid { margin: 6px 12px 12px; border-radius: var(--r-card); overflow: hidden;
          background: var(--surface); box-shadow: var(--shadow);
          border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
          flex: 93 1 0%; display: flex; flex-direction: column; }
  .grid-spacer { flex: 7 1 0%; }
  .week { position: relative; flex: 1; display: flex; flex-direction: column; }
  .week-row { display: grid; grid-template-columns: repeat(7,1fr); flex: 1; }
  .cell {
    position: relative; min-height: 63px;
    border-top: 1px solid var(--border); border-left: 1px solid var(--border);
    background: var(--surface); text-align: left;
    box-shadow: var(--cell-shadow);
  }
  .book-price { position: absolute; top: 23%; right: 6px; font-size: 11px; font-weight: 700;
    color: var(--accent); white-space: nowrap; overflow: hidden; text-align: right; }
  .cell:active { background: var(--surface-2); }
  .cell.we { background: var(--weekend-bg); }
  .cell.turn { background: var(--turn-bg); }
  .cell.out { background: var(--bg); box-shadow: none; }
  .cell.out.we, .cell.out.turn { background: var(--bg); }
  .daynum { position: absolute; top: 5px; left: 6px; width: 24px; height: 24px;
            display: grid; place-items: center; font-size: 16px; font-weight: 600;
            border-radius: 6px; color: var(--text); }
  .daynum.we { font-size: 18px; font-weight: 800; }
  .cell.out .daynum { color: var(--text-muted); opacity: .5; }
  .cell.today .daynum { background: var(--accent); color: #fff; }
  .event-ind { position: absolute; top: 11px; left: 34px; width: 11px; height: 11px;
               background: var(--event); border-radius: 50%; }
  /* Брони — капсулы поверх ячеек (главный слой, сетка не заливается, без точек/маркеров) */
  .bars { position: absolute; inset: 0; pointer-events: none; }
  .bar { position: absolute; height: 27px; border-radius: 14px; background: var(--accent);
         color: #fff; font-size: 15px; font-weight: 800; line-height: 27px;
         display: flex; align-items: center; padding: 0 10px; overflow: hidden; }
  .bar.bath { background: var(--terracotta); }
  .bar.sq-l { border-top-left-radius: 0; border-bottom-left-radius: 0; padding-left: 6px; }
  .bar.sq-r { border-top-right-radius: 0; border-bottom-right-radius: 0; padding-right: 6px; }
  .bar.one { padding: 0 5px; }
  .bar .nm { flex: 1; min-width: 0; overflow: hidden; text-overflow: clip; white-space: nowrap; }
  .joint { position: absolute; width: 10px; height: 10px; border-radius: 50%;
           background: var(--joint); border: 2px solid var(--surface); z-index: 2; }
  /* Заработки (работа) — тонкая линия-лидер от левого края к сумме, не капсула; стек снизу вверх */
  .work-stack { position: absolute; left: 6px; right: 6px; bottom: 3px; }
  .work-strip { position: absolute; left: 0; right: 0; height: 12px;
    display: flex; align-items: center; }
  .work-strip .ln { flex: 1; height: 4px; border-radius: 2px; background: var(--work-green); margin-right: 5px; }
  .work-strip .amt { color: var(--work-green); font-size: 11px; font-weight: 700; white-space: nowrap; }
  .work-strip.tight .ln { height: 3px; margin-right: 3px; }
  .work-strip.tight .amt { font-size: 9px; }

  /* ============ Итог месяца (bento) ============ */
  .summary {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 25;
    max-width: 560px; margin: 0 auto;
    padding: 12px 14px calc(var(--safe-b) + 12px);
    background: color-mix(in srgb, var(--surface) 88%, transparent);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 8px;
  }
  .bento { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-card); padding: 9px 12px; }
  .bento .lbl { font-size: 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
  .bento .val { font-family: var(--font-display); font-weight: 700; font-size: 18px; margin-top: 2px; }
  .bento.income .val { color: var(--success); font-size: 20px; }
  .bento.income { cursor: pointer; }
  .bento .lbl .ic { color: var(--text-muted); margin-left: 2px; }

  .stat-total { text-align: center; padding: 6px 0 10px; }
  .stat-total .big { font-family: var(--font-display); font-size: 30px; font-weight: 700; color: var(--success); margin-top: 2px; }
  .stat-line { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; font-weight: 600; }
  .stat-line span { display: flex; align-items: center; gap: 8px; color: var(--text-muted); }
  .statbar { height: 8px; background: var(--surface-2); border-radius: 3px; margin-top: 6px; overflow: hidden; border: 1px solid var(--border); }
  .statbar > div { height: 100%; border-radius: 0; min-width: 2px; transition: width .3s; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 18px; }
  .stat-grid .bento { text-align: center; }

  .fab {
    position: fixed; z-index: 26; right: 16px; bottom: calc(var(--safe-b) + 96px);
    width: 60px; height: 60px; border-radius: 12px; background: var(--accent); color: #fff;
    display: grid; place-items: center; box-shadow: var(--shadow);
    transition: transform .15s;
  }
  .fab:active { transform: scale(.92); }
  .fab svg { width: 28px; height: 28px; }
  /* Пружинный "поп"-отклик при нажатии — на всех кнопках/тоглах приложения */
  @keyframes btnPop {
    0% { transform: scale(1); }
    35% { transform: scale(.88); }
    60% { transform: scale(1.08); }
    80% { transform: scale(.98); }
    100% { transform: scale(1); }
  }
  @keyframes fabPop {
    0% { transform: scale(1) rotate(0deg); }
    30% { transform: scale(.86) rotate(-6deg); }
    60% { transform: scale(1.14) rotate(4deg); }
    80% { transform: scale(.97) rotate(-1deg); }
    100% { transform: scale(1) rotate(0deg); }
  }
  .pop { animation: btnPop .4s cubic-bezier(.34,1.56,.64,1); }
  .fab.pop { animation: fabPop .5s cubic-bezier(.34,1.56,.64,1); }

  /* ============ Шторки / модалки ============ */
  .scrim { position: fixed; inset: 0; z-index: 40; background: rgba(10,12,15,.55);
           opacity: 0; pointer-events: none; transition: opacity .25s; }
  .scrim.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 41;
    max-width: 560px; margin: 0 auto;
    background: var(--surface); border-radius: var(--r-sheet) var(--r-sheet) 0 0;
    box-shadow: var(--shadow); transform: translateY(110%);
    transition: transform .32s cubic-bezier(.2,.8,.2,1);
    max-height: 90vh; display: flex; flex-direction: column;
    padding-bottom: var(--safe-b);
  }
  .sheet.open { transform: translateY(0); }
  .grab { width: 40px; height: 4px; border-radius: 2px; background: var(--border); margin: 10px auto 4px; touch-action: none; }
  .sheet-head { display: flex; align-items: center; gap: 8px; padding: 4px 16px 10px; touch-action: none; }
  .sheet-head h2 { font-family: var(--font-display); font-size: 18px; margin: 0; flex: 1; font-weight: 700; }
  .sheet-head h2 small { display:block; font-family: var(--font-ui); font-size:12px; color: var(--text-muted); font-weight:500; }
  .sheet-body { overflow-y: auto; padding: 0 16px 16px; -webkit-overflow-scrolling: touch; }

  @media (prefers-reduced-motion: reduce) {
    .sheet, .scrim, .fab { transition: none; }
    .pop, .fab.pop { animation: none; }
  }

  /* ============ Карточки записей ============ */
  .rec { display: flex; gap: 10px; padding: 12px;
         background: color-mix(in srgb, var(--surface) 75%, transparent);
         backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
         border: 1px solid var(--border); border-left: 6px solid var(--border);
         border-radius: var(--r-card); margin-bottom: 8px; box-shadow: var(--shadow); }
  .ic { display: inline-block; vertical-align: middle; flex: none; }
  .rec .recico { display: grid; place-items: center; padding-top: 1px; }
  .rec.b .recico { color: var(--accent); } .rec.bath .recico { color: var(--terracotta); }
  .rec.work .recico { color: var(--work-green); } .rec.event .recico { color: var(--event); }
  .chip .ic, .togchip .ic { margin-right: 2px; }
  .rec .body { flex: 1; min-width: 0; }
  .rec .ttl { font-weight: 700; display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .rec .ttl .time { font-size: 12px; color: var(--text-muted); font-weight: 600; }
  .rec .meta { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
  .rec .amount { font-weight: 700; color: var(--success); white-space: nowrap; }
  .rec .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .chip { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: var(--r-chip); background: var(--surface-2);
          border: 1px solid var(--border); text-transform: uppercase; letter-spacing: .3px; }
  .chip.on { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  .rec .acts { display: flex; flex-direction: column; gap: 6px; }
  .rec .acts button { width: 34px; height: 34px; border-radius: 6px; display: grid; place-items: center; background: var(--surface-2); }
  .rec.b { border-left-color: var(--accent); }
  .rec.bath { border-left-color: var(--terracotta); }
  .rec.work { border-left-color: var(--work-green); padding-top: 8px; padding-bottom: 8px; }
  .rec.event { border-left-color: var(--event); }
  .rec.done { opacity: .55; }
  .rec.done .ttl { text-decoration: line-through; }
  .day-total { text-align: right; font-weight: 700; margin: 4px 0 12px; color: var(--text-muted); }
  .day-total b { color: var(--success); }

  .empty { text-align: center; color: var(--text-muted); padding: 28px 12px; }
  .empty .big { font-size: 34px; }

  /* ============ Формы ============ */
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; }
  .field input[type=text], .field input[type=tel],
  .field input[type=date], .field input[type=time], .field textarea {
    width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface-2); color: var(--text); -webkit-user-select: text; user-select: text;
  }
  .field textarea { min-height: 60px; resize: vertical; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .toggles { display: flex; gap: 8px; flex-wrap: wrap; }
  .togchip { display: inline-flex; align-items: center; gap: 6px; padding: 9px 14px;
             border-radius: 8px; border: 1px solid var(--border); background: var(--surface-2);
             font-weight: 600; font-size: 14px; }
  .togchip.on { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  .switch-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; }
  .switch { width: 48px; height: 28px; border-radius: 6px; background: var(--border); position: relative; transition: background .2s; flex: none; }
  .switch.on { background: var(--accent); }
  .switch::after { content:""; position: absolute; top: 3px; left: 3px; width: 22px; height: 22px; border-radius: 4px; background: #fff; transition: left .2s; }
  .switch.on::after { left: 23px; }
  .warn { background: color-mix(in srgb, var(--warning) 22%, var(--surface)); border: 1px solid var(--warning);
          color: var(--text); padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }
  .form-actions { display: flex; gap: 10px; margin-top: 8px; }
  .btn { flex: 1; padding: 14px; border-radius: 8px; font-weight: 700; font-size: 16px; text-align: center; }
  .btn.primary { background: var(--accent); color: #fff; }
  .btn.primary:disabled { opacity: .45; }
  .btn.ghost { background: var(--surface-2); }
  .btn.del { background: transparent; color: var(--danger); flex: 0 0 auto; padding: 14px 16px; }

  /* Выбор типа записи */
  .typegrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .typebtn { display: flex; align-items: center; gap: 12px; padding: 16px; border-radius: 10px;
             background: var(--surface-2); font-weight: 700; font-size: 16px; }
  .typebtn .e { font-size: 24px; }

  /* Настройки */
  .seg { display: flex; background: var(--surface-2); border-radius: 8px; padding: 4px; gap: 4px; }
  .seg button { flex: 1; padding: 10px; border-radius: 5px; font-weight: 600; }
  .seg button.on { background: var(--accent); color: #fff; }
  .set-group { margin-bottom: 18px; }
  .set-group h3 { font-size: 13px; text-transform: uppercase; letter-spacing: .5px; color: var(--text-muted); margin: 0 0 8px; }
  .set-row { display: flex; gap: 10px; }
  .set-row .btn { font-size: 15px; padding: 13px; }
  .hint { font-size: 12px; color: var(--text-muted); margin-top: 6px; }

  /* Тост */
  .toast { position: fixed; left: 50%; transform: translateX(-50%); bottom: calc(var(--safe-b) + 170px);
           z-index: 60; background: var(--text); color: var(--bg); padding: 12px 16px; border-radius: 8px;
           display: flex; align-items: center; gap: 14px; box-shadow: var(--shadow); font-weight: 600;
           opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; max-width: 92vw; }
  .toast.show { opacity: 1; pointer-events: auto; }
  .toast button { color: var(--accent); font-weight: 800; }

  /* Онбординг */
  #onboard { position: fixed; inset: 0; z-index: 70; background: var(--bg); display: none;
             flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 32px; }
  #onboard.show { display: flex; }

  #onboard h1 { font-family: var(--font-display); font-size: 28px; margin: 0 0 12px; }
  #onboard p { color: var(--text-muted); max-width: 320px; margin: 0 0 28px; }
  #onboard .btn { flex: none; width: 100%; }
</style>
</head>
<body>

  <div class="big" style="color:var(--accent)"><svg width="68" height="68" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5l9-7 9 7"/><path d="M5.5 10v9.5h13V10"/><path d="M10 19.5v-5h4v5"/></svg></div>
  <h1>Мой Календарь</h1>
  <p>Ваш ежедневник по дням: брони домика, баня, дела и деньги — всё на одном экране.</p>
  <button class="btn primary" id="onboardStart" style="max-width:240px">Начать</button>

<script>
"use strict";
/* ===================================================================
   Мой Календарь — single-file PWA (vanilla JS, без внешних библиотек)
   =================================================================== */

const TYPES = {
  booking:  { name: "Бронь",       cls: "b" },
  bath:     { name: "Баня",        cls: "bath" },
  work:     { name: "Работа",      cls: "work" },
  event:    { name: "Событие",     cls: "event" },
};
const TYPE_COLOR = { booking: "var(--accent)", bath: "var(--terracotta)", work: "var(--work-green)", event: "var(--event)" };
const TYPE_ORDER = { booking: 0, bath: 1, work: 2, event: 3 };
/* Единый линейный набор иконок (без эмодзи) */
const ICONS = {
  booking: '<path d="M3 11.5l9-7 9 7"/><path d="M5.5 10v9.5h13V10"/><path d="M10 19.5v-5h4v5"/>',
  bath: '<path d="M4 12.5h16v2.5a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4z"/><path d="M7 19.5l-1 1.6M18 19.5l-1 1.6"/><path d="M8 12.5V6.4a2 2 0 0 1 4 0"/><path d="M14.6 3.6c.7.7.7 1.5 0 2.2M17.2 3.6c.7.7.7 1.5 0 2.2"/>',
  work: '<rect x="3" y="7.5" width="18" height="12.5" rx="2.2"/><path d="M8.5 7.5V6a2 2 0 0 1 2-2h3a2 2 0 0 1 2 2v1.5"/><path d="M3 12.5h18"/>',
  event: '<path d="M5 20.5h14V14a3 3 0 0 0-3-3H8a3 3 0 0 0-3 3z"/><path d="M4.5 15.5h15"/><path d="M8.5 8.5V5.6M12 8.5V4.6M15.5 8.5V5.6"/>',
  bikes: '<circle cx="6.5" cy="16.5" r="3.2"/><circle cx="17.5" cy="16.5" r="3.2"/><path d="M6.5 16.5l3.7-7H15l2.5 7"/><path d="M9.5 9.5H15"/>',
  sup: '<ellipse cx="12" cy="15.5" rx="8" ry="3"/><path d="M12 15.5V3.6"/><path d="M9 4.4h6"/>',
  stats: '<path d="M4 20V12M10 20V5M16 20v-6M22 20H2"/>',
};
function ic(name, size, sw) { return `<svg class="ic" width="${size||20}" height="${size||20}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${sw||1.8}" stroke-linecap="round" stroke-linejoin="round">${ICONS[name] || ""}</svg>`; }
const MONTHS = ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
const WD = ["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];

/* ---------- Состояние ---------- */
let state = { version: 1, settings: { theme: "system", currency: "₽", notifications: false, lastBackupAt: null }, records: [], clients: [] };
let view = { year: 0, month: 0 };          // отображаемый месяц
let pendingDelete = null;                   // для undo

/* ---------- IndexedDB ---------- */
const DB_NAME = "myCalendar", STORE = "doc", KEY = "app";
function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(DB_NAME, 1);
    r.onupgradeneeded = () => { r.result.createObjectStore(STORE); };
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function dbLoad() {
  try {
    const db = await openDB();
    return await new Promise((res, rej) => {
      const tx = db.transaction(STORE, "readonly").objectStore(STORE).get(KEY);
      tx.onsuccess = () => res(tx.result || null);
      tx.onerror = () => rej(tx.error);
    });
  } catch (e) {
    try { return JSON.parse(localStorage.getItem("mc-data") || "null"); } catch (_) { return null; }
  }
}
let saveTimer = null;
function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      const db = await openDB();
      db.transaction(STORE, "readwrite").objectStore(STORE).put(JSON.parse(JSON.stringify(state)), KEY);
    } catch (e) {
      try { localStorage.setItem("mc-data", JSON.stringify(state)); } catch (_) {}
    }
  }, 120);
}
async function requestPersist() {
  try { if (navigator.storage && navigator.storage.persist) await navigator.storage.persist(); } catch (e) {}
}

/* ---------- Даты (строки YYYY-MM-DD, без объекта Date в хранилище) ---------- */
const pad = n => String(n).padStart(2, "0");
function todayStr() { const d = new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function ymd(y, m, d) { return `${y}-${pad(m+1)}-${pad(d)}`; }       // m: 0..11
function parse(s) { const [y,m,d] = s.split("-").map(Number); return { y, m: m-1, d }; }
function addDays(s, n) { const p = parse(s); const dt = new Date(p.y, p.m, p.d + n); return ymd(dt.getFullYear(), dt.getMonth(), dt.getDate()); }
function cmp(a, b) { return a < b ? -1 : a > b ? 1 : 0; }
function dowMon(s) { const p = parse(s); const w = new Date(p.y, p.m, p.d).getDay(); return (w + 6) % 7; } // 0=Пн
function daysInMonth(y, m) { return new Date(y, m+1, 0).getDate(); }
function nightsBetween(ci, co) { const a = parse(ci), b = parse(co); return Math.round((new Date(b.y,b.m,b.d) - new Date(a.y,a.m,a.d)) / 86400000); }

function monthWeeks(y, m) {
  const first = ymd(y, m, 1);
  const start = addDays(first, -dowMon(first));     // понедельник первой недели
  const weeks = [];
  let cur = start;
  for (let w = 0; w < 6; w++) {
    const days = [];
    for (let i = 0; i < 7; i++) { const p = parse(cur); days.push({ s: cur, inMonth: p.m === m, d: p.d }); cur = addDays(cur, 1); }
    weeks.push(days);
    if (parse(cur).m !== m && w >= 3 && weeks[w][6].s >= ymd(y, m, daysInMonth(y, m))) break;
  }
  return weeks;
}

/* ---------- Деньги ---------- */
const money = n => (n || 0).toLocaleString("ru-RU").replace(/\s/g, ".") + " " + state.settings.currency;
function compact(n) { if (!n) return ""; if (n >= 1000) { const k = n/1000; return (Number.isInteger(k)?k:k.toFixed(1)) + "к"; } return String(n); }

/* ---------- Выборки и расчёты ---------- */
function recsOnDay(s) {
  return state.records.filter(r => {
    if (r.type === "booking") return r.checkIn <= s && s <= r.checkOut;
    return r.date === s;
  });
}
function dayIncome(s) {
  let sum = 0;
  for (const r of state.records) {
    if (r.type === "booking" && r.checkIn === s) sum += +r.price || 0;
    else if (r.type === "bath" && r.date === s) sum += +r.price || 0;
    else if (r.type === "work" && r.date === s) sum += +r.amount || 0;
  }
  return sum;
}
function monthStats(y, m) {
  const dim = daysInMonth(y, m);
  const first = ymd(y, m, 1), last = ymd(y, m, dim);
  let income = 0, nights = 0, deposits = 0;
  for (let d = 1; d <= dim; d++) income += dayIncome(ymd(y, m, d));
  for (const r of state.records) {
    if (r.type !== "booking") continue;
    let cur = r.checkIn;
    while (cur < r.checkOut) { if (cur >= first && cur <= last) nights++; cur = addDays(cur, 1); }
    if (r.deposit && r.deposit.taken && r.checkIn >= first && r.checkIn <= last) deposits++;
  }
  return { income, nights, occ: Math.round(nights / dim * 100), deposits };
}
function overlappingBookings(ci, co, excludeId) {
  return state.records.filter(r => r.type === "booking" && r.id !== excludeId && ci < r.checkOut && r.checkIn < co);
}

/* ---------- Рендер месяца ---------- */
function render() {
  document.getElementById("monthTitle").innerHTML = `${MONTHS[view.month]} <small>${view.year}</small>`;
  const wd = document.getElementById("weekdays");
  wd.innerHTML = WD.map((d,i) => `<span class="${i>=5?'we':''}">${d}</span>`).join("");

  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  const today = todayStr();
  const weeks = monthWeeks(view.year, view.month);

  for (const week of weeks) {
    const wEl = document.createElement("div");
    wEl.className = "week";
    const rowStart = week[0].s, rowEnd = week[6].s;

    // клетки
    const row = document.createElement("div");
    row.className = "week-row";
    for (const day of week) {
      const recs = recsOnDay(day.s);
      const others = recs.filter(r => ["work","event"].includes(r.type));
      const workRecs = recs.filter(r => r.type === "work").reverse(); // новая запись внизу, старые поднимаются выше
      let workStackHTML = "";
      if (workRecs.length) {
        const n = workRecs.length;
        // больше 3 — ужимаем шаг и высоту строки адаптивно под количество; 3 и меньше — текущий алгоритм без изменений
        const step = n > 3 ? Math.max(8, Math.round(39 / n)) : 13;
        const rowH = Math.min(12, step - 1);
        const tight = n > 3 ? " tight" : "";
        workStackHTML = workRecs.map((r,i) => `<span class="work-strip${tight}" style="bottom:${i*step}px;height:${rowH}px"><span class="ln"></span><span class="amt num">${compact(+r.amount||0)}</span></span>`).join("");
      }
      const bookInc = recs.reduce((s, r) => s + (r.type === "booking" && r.checkIn === day.s ? (+r.price || 0) : 0), 0);
      const bathInc = recs.reduce((s, r) => s + (r.type === "bath" && r.date === day.s ? (+r.price || 0) : 0), 0);
      const cell = document.createElement("button");
      const we = dowMon(day.s) >= 5;
      const turn = recs.some(r => r.type === "booking" && r.checkOut === day.s)
                && recs.some(r => r.type === "booking" && r.checkIn === day.s);
      cell.className = "cell" + (day.inMonth ? "" : " out") + (day.s === today ? " today" : "") + (we ? " we" : "") + (turn ? " turn" : "");
      cell.innerHTML = `
        <span class="daynum num${we ? ' we' : ''}">${day.d}</span>
        ${others.length ? `<span class="event-ind"></span>` : ``}
        ${(bookInc+bathInc) ? `<span class="book-price num">${compact(bookInc+bathInc)}</span>` : ``}
        ${workRecs.length ? `<div class="work-stack">${workStackHTML}</div>` : ``}`;
      cell.addEventListener("click", () => openDay(day.s));
      row.appendChild(cell);
    }
    wEl.appendChild(row);

    // брони: занятые ночи = check-in … (check-out − 1). Полоса визуально тянется до середины дня выезда.
    const wkBookings = state.records.filter(r => r.type === "booking");
    const segs = [];
    for (const b of wkBookings) {
      const lastNight = addDays(b.checkOut, -1);           // последний занятый день (выезд не занят)
      const segStart = b.checkIn > rowStart ? b.checkIn : rowStart;
      const segEnd = lastNight < rowEnd ? lastNight : rowEnd;
      if (lastNight >= b.checkIn && segStart <= segEnd)
        segs.push({ b, sc: dowMon(segStart), ec: dowMon(segEnd), trueStart: segStart === b.checkIn, trueEnd: segEnd === lastNight, kind: "booking" });
    }
    // баня без домика: всегда один день, капсула только внутри своей клетки, без стыковок
    const wkBaths = state.records.filter(r => r.type === "bath" && r.date >= rowStart && r.date <= rowEnd);
    for (const b of wkBaths) {
      const col = dowMon(b.date);
      segs.push({ b, sc: col, ec: col, trueStart: true, trueEnd: true, kind: "bath" });
    }
    segs.sort((a, b) => a.sc - b.sc);
    const lanes = [];
    for (const seg of segs) {
      let li = lanes.findIndex(L => L[L.length - 1].ec < seg.sc);
      if (li === -1) { li = lanes.length; lanes.push([]); }
      lanes[li].push(seg); seg.lane = li;
    }
    // стык: выезд одной брони = заезд другой в тот же день — отмечаем для отрисовки (баню не стыкуем)
    for (const lane of lanes) {
      for (let i = 0; i < lane.length - 1; i++) {
        const prev = lane[i], next = lane[i + 1];
        if (prev.kind === "booking" && next.kind === "booking" && prev.trueEnd && next.trueStart && next.sc === prev.ec + 1) {
          prev.joinEnd = true; next.joinStart = true;
        }
      }
    }
    if (segs.length) {
      const colW = 100 / 7, H = 27, G = 6, nL = lanes.length, stackH = nL * H + (nL - 1) * G;
      const topFor = lane => `calc(48% - ${stackH / 2}px + ${lane * (H + G)}px)`;
      const overlay = document.createElement("div");
      overlay.className = "bars";
      for (const seg of segs) {
        const bar = document.createElement("div");
        const isBath = seg.kind === "bath";
        const cols = seg.ec - seg.sc + 1;
        bar.className = "bar" + (isBath ? " bath" : "") + (cols === 1 ? " one" : "") + (seg.trueStart ? "" : " sq-l") + (seg.trueEnd ? "" : " sq-r");
        // баня — строго внутри своего дня, без растяжения и стыковок; на стыке брони — чашечка на середине дня (0.5), свободный конец — дальше середины (0.3/0.7)
        const leftCol = isBath ? seg.sc : seg.sc + (seg.trueStart ? (seg.joinStart ? 0.5 : 0.3) : 0);
        const rightCol = isBath ? seg.ec + 1 : seg.ec + 1 + (seg.trueEnd ? (seg.joinEnd ? 0.5 : 0.7) : 0);
        const lm = isBath ? 2 : (seg.trueStart ? 0 : 2), rm = isBath ? 2 : (seg.trueEnd ? 0 : 2);
        bar.style.left = `calc(${leftCol * colW}% + ${lm}px)`;
        bar.style.width = `calc(${(rightCol - leftCol) * colW}% - ${lm + rm}px)`;
        bar.style.top = topFor(seg.lane);
        const label = shortGuestName(seg.b.guestName, cols, isBath ? "Баня" : "Бронь");
        bar.title = seg.b.guestName || (isBath ? "Баня" : "Бронь");
        bar.innerHTML = `<span class="nm">${esc(label)}</span>`;
        overlay.appendChild(bar);
      }
      // видимый штифт ровно на середине дня стыка
      for (const lane of lanes) {
        for (let i = 0; i < lane.length - 1; i++) {
          const prev = lane[i], next = lane[i + 1];
          if (prev.joinEnd && next.joinStart) {
            const joint = document.createElement("div");
            joint.className = "joint";
            joint.style.left = `calc(${(next.sc + 0.5) * colW}% - 5px)`;
            joint.style.top = `calc(48% - ${stackH / 2}px + ${prev.lane * (H + G)}px + ${H / 2 - 5}px)`;
            overlay.appendChild(joint);
          }
        }
      }
      wEl.appendChild(overlay);
    }
    grid.appendChild(wEl);
  }

  renderSummary();
}

function renderSummary() {
  const st = monthStats(view.year, view.month);
  const dim = daysInMonth(view.year, view.month);
  document.getElementById("summary").innerHTML = `
    <div class="bento income" id="statsEntry"><div class="lbl">Доход за месяц ${ic('stats',12)}</div><div class="val num">${money(st.income)}</div></div>
    <div class="bento"><div class="lbl">Занято</div><div class="val num">${st.nights} / ${dim}</div></div>
    <div class="bento"><div class="lbl">Загрузка</div><div class="val num">${st.occ}%</div></div>`;
  document.getElementById("statsEntry").onclick = openStats;
}

/* ---------- Финансовая статистика ---------- */
function statsFor(from, to) {
  let bookingInc = 0, bathInc = 0, workInc = 0, nights = 0, bookings = 0, depCount = 0, depSum = 0;
  for (const r of state.records) {
    if (r.type === "booking") {
      if (r.checkIn >= from && r.checkIn <= to) {
        bookingInc += +r.price || 0; bookings++;
        if (r.deposit && r.deposit.taken) { depCount++; depSum += +r.deposit.amount || 0; }
      }
      let cur = r.checkIn;
      while (cur < r.checkOut) { if (cur >= from && cur <= to) nights++; cur = addDays(cur, 1); }
    } else if (r.type === "bath" && r.date >= from && r.date <= to) {
      bathInc += +r.price || 0;
      if (r.deposit && r.deposit.taken) { depCount++; depSum += +r.deposit.amount || 0; }
    } else if (r.type === "work" && r.date >= from && r.date <= to) {
      workInc += +r.amount || 0;
    }
  }
  const days = nightsBetween(from, to) + 1;
  return { income: bookingInc + bathInc + workInc, bookingInc, bathInc, workInc, nights, bookings, occ: Math.round(nights / days * 100), depCount, depSum, days };
}
function statsHTML(from, to, mode) {
  if (!from || !to || from > to) return `<div class="empty">Укажите период (с ≤ по)</div>`;
  const s = statsFor(from, to);
  const max = Math.max(s.bookingInc, s.bathInc, s.workInc, 1);
  const bar = (val, col) => `<div class="statbar"><div style="width:${Math.round(val / max * 100)}%;background:${col}"></div></div>`;
  const p = parse(from), q = parse(to);
  const label = `${p.d} ${MONTHS[p.m].slice(0,3).toLowerCase()} — ${q.d} ${MONTHS[q.m].slice(0,3).toLowerCase()} · ${s.days} дн.`;
  return `
    <div class="stat-total"><div class="lbl">Доход за период</div><div class="big num">${money(s.income)}</div>${mode === "month" ? "" : `<div class="hint">${label}</div>`}</div>
    <div class="stat-line"><span>${ic('booking',16)} Брони</span><b class="num">${money(s.bookingInc)}</b></div>${bar(s.bookingInc,'var(--accent)')}
    ${s.bathInc ? `<div class="stat-line"><span>${ic('bath',16)} Только баня</span><b class="num">${money(s.bathInc)}</b></div>${bar(s.bathInc,'var(--terracotta)')}` : ``}

/* ---------- Пружинный отклик на нажатие кнопок ---------- */
function initButtonPop() {
  const SEL = ".iconbtn, .fab, .btn, .typebtn, .togchip, .seg button, .switch, .rec .acts button";
  document.addEventListener("click", e => {
    const btn = e.target.closest(SEL);
    if (!btn) return;
    btn.classList.remove("pop");
    void btn.offsetWidth; // форсируем reflow, чтобы анимация перезапускалась и при быстрых повторных нажатиях
    btn.classList.add("pop");
  });

/* ---------- Свайп вниз для закрытия шторки ---------- */
function initSheetDrag() {
  const sheet = document.getElementById("sheet");
  const scrim = document.getElementById("scrim");
  const zones = [sheet.querySelector(".grab"), sheet.querySelector(".sheet-head")];
  let startY = 0, dragging = false, sheetH = 1;
  function reset(delay) {
    setTimeout(() => {
      sheet.style.transition = ""; sheet.style.transform = "";
      scrim.style.transition = ""; scrim.style.opacity = "";
    }, delay);
  }
  function onStart(e) {
    if (!sheet.classList.contains("open")) return;
    startY = e.touches[0].clientY;
    sheetH = sheet.offsetHeight || 1;
    dragging = true;
    sheet.style.transition = "none";
  }
  function onMove(e) {
    if (!dragging) return;
    const dy = Math.max(0, e.touches[0].clientY - startY);
    sheet.style.transform = `translateY(${dy}px)`;
    scrim.style.opacity = String(Math.max(0, 1 - dy / sheetH));
  }
  function onEnd(e) {
    if (!dragging) return;
    dragging = false;
    const dy = Math.max(0, e.changedTouches[0].clientY - startY);
    sheet.style.transition = "transform .26s cubic-bezier(.2,.8,.2,1)";
    scrim.style.transition = "opacity .26s";
    if (dy > sheetH * 0.3 || dy > 140) {
      sheet.style.transform = "translateY(110%)";
      scrim.style.opacity = "0";
      setTimeout(closeSheet, 260);
      reset(260);
    } else {
      sheet.style.transform = "translateY(0)";
      scrim.style.opacity = "1";
      reset(260);
    }
  }
  zones.forEach(z => {
    if (!z) return;
    z.addEventListener("touchstart", onStart, { passive: true });
    z.addEventListener("touchmove", onMove, { passive: true });
    z.addEventListener("touchend", onEnd, { passive: true });
  });
}

function bindForm(type, day, editId) {
  // тумблеры «что входит»
  const extras = {};
  document.querySelectorAll("[data-ex]").forEach(b => { extras[b.dataset.ex] = b.classList.contains("on"); b.onclick = () => { b.classList.toggle("on"); extras[b.dataset.ex] = b.classList.contains("on"); }; });
  // депозит
  let depTaken = false;
  const swDep = document.getElementById("sw-dep");
  if (swDep) { depTaken = swDep.classList.contains("on"); swDep.onclick = () => { swDep.classList.toggle("on"); depTaken = swDep.classList.contains("on"); document.getElementById("f-dep-amount").style.display = depTaken ? "" : "none"; }; }
  // notify
  let notify = false;
  const swN = document.getElementById("sw-notify");
  if (swN) { notify = swN.classList.contains("on"); swN.onclick = () => { swN.classList.toggle("on"); notify = swN.classList.contains("on"); }; }

  // живое форматирование: имя с большой буквы, телефон маской +7 ХХХ ХХХ-ХХ-ХХ, суммы с точкой по тысячам
  const nameInput = document.getElementById("f-guest") || document.getElementById("f-contact");
  if (nameInput) bindLiveFormat(nameInput.id, capName, false);
  bindLiveFormat("f-phone", formatPhone, true);
  bindLiveFormat("f-price", v => groupThousands(digitsOnly(v)), true);
  bindLiveFormat("f-amount", v => groupThousands(digitsOnly(v)), true);
  bindLiveFormat("f-dep-amount", v => groupThousands(digitsOnly(v)), true);

  // автоподстановка телефона по клиенту
  if (nameInput) nameInput.addEventListener("change", () => {
    const c = state.clients.find(c => c.name === nameInput.value);
    const ph = document.getElementById("f-phone");
    if (c && ph && !ph.value) ph.value = formatPhone(c.phone || "");
  });

  // предупреждение о пересечении (бронь)
  function checkOverlap() {
    if (type !== "booking") return;
    const ci = document.getElementById("f-ci").value, co = document.getElementById("f-co").value;
    const w = document.getElementById("overlapWarn");
    if (ci && co && co > ci) {
      const ov = overlappingBookings(ci, co, editId);

  document.getElementById("f-cancel").onclick = () => day ? openDay(day) : closeSheet();
  if (editId) document.getElementById("f-del").onclick = () => { confirmDelete(editId, day || (findRec(editId).date)); };

}

function val(id) { const el = document.getElementById(id); return el ? el.value.trim() : ""; }
function digitsOnly(s) { return String(s||"").replace(/\D/g, ""); }
function groupThousands(digits) { return digits.replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
function numVal(id) { const v = digitsOnly(val(id)); return v === "" ? 0 : +v; }
// Имя: первая буква каждого слова — заглавная, по мере набора (длина строки не меняется, курсор не прыгает)
function capName(v) { return v.replace(/(^|\s)(\S)/g, (m, sep, ch) => sep + ch.toUpperCase()); }
// Телефон: живая маска +7 ХХХ ХХХ-ХХ-ХХ; ведущие 7/8 считаем кодом страны
function formatPhone(v) {
  let d = digitsOnly(v);
  if (!d) return "";
  if (d[0] === "7" || d[0] === "8") d = d.slice(1);
  d = d.slice(0, 10);
  let out = "+7";
  if (d.length) out += " " + d.slice(0, 3);
  if (d.length > 3) out += " " + d.slice(3, 6);
  if (d.length > 6) out += "-" + d.slice(6, 8);
  if (d.length > 8) out += "-" + d.slice(8, 10);
  return out;
}
// Подключает живое форматирование к полю; snapEnd — переносить курсор в конец (для телефона/денег), иначе сохраняем позицию (для имени)
function bindLiveFormat(id, fmt, snapEnd) {
  const el = document.getElementById(id);
  if (!el) return;
  el.value = fmt(el.value);
  el.addEventListener("input", () => {
    if (snapEnd) {
      // телефон/деньги: переформатирование меняет позиции разделителей — держим курсор после той же N-й цифры,
      // а не всегда в конце, иначе правка не с конца строки была бы невозможна
      const digitsBefore = digitsOnly(el.value.slice(0, el.selectionStart)).length;
      el.value = fmt(el.value);
      let i = 0;
      if (digitsBefore > 0) {
        let seen = 0;
        for (; i < el.value.length; i++) {
          if (/\d/.test(el.value[i])) { seen++; if (seen === digitsBefore) { i++; break; } }
        }
      }
      el.setSelectionRange(i, i);
    } else {
      const pos = el.selectionStart;
      el.value = fmt(el.value);
      el.setSelectionRange(pos, pos);
    }
  });
}

function saveForm(type, day, editId, extras, depTaken, notify) {
  let rec = editId ? findRec(editId) : { id: uid(), type, createdAt: new Date().toISOString() };
  rec.updatedAt = new Date().toISOString();
  const dep = { taken: depTaken, amount: depTaken ? numVal("f-dep-amount") : 0 };

  if (type === "booking") {
    const guest = val("f-guest"), ci = val("f-ci"), co = val("f-co"), price = numVal("f-price");
    if (!guest || !ci || !co || !(co > ci) || val("f-price") === "") return flash("Заполните имя, даты (выезд позже заезда) и стоимость");
    Object.assign(rec, { guestName: guest, phone: val("f-phone"), checkIn: ci, checkInTime: val("f-cit"), checkOut: co, checkOutTime: val("f-cot"), price, extras, deposit: dep, comment: val("f-comment") });
    rememberClient(guest, rec.phone);
  } else if (type === "bath") {
    const date = val("f-date"), from = val("f-from"), to = val("f-to"), price = numVal("f-price");
    if (!date || !from || !to || val("f-price") === "") return flash("Дата, время с–по и стоимость обязательны");
    Object.assign(rec, { guestName: val("f-guest"), phone: val("f-phone"), date, fromTime: from, toTime: to, price, extras, deposit: dep, comment: val("f-comment") });
    rememberClient(rec.guestName, rec.phone);
  } else if (type === "work") {
    const title = val("f-title"), date = val("f-date"), amount = numVal("f-amount");
    if (!title || !date || val("f-amount") === "") return flash("Название, дата и сумма обязательны");
    Object.assign(rec, { title, date, time: val("f-time"), contactName: val("f-contact"), phone: val("f-phone"), amount, notify, comment: val("f-comment") });
    rememberClient(rec.contactName, rec.phone);
    if (notify) ensureNotifyPermission();
  } else if (type === "event") {
    const title = val("f-title"), date = val("f-date");
    if (!title || !date) return flash("Название и дата обязательны");
    Object.assign(rec, { title, date, time: val("f-time"), notify, comment: val("f-comment") });
    if (notify) ensureNotifyPermission();
  }

  if (!editId) state.records.push(rec);
  save();
  const back = day || rec.date || rec.checkIn;
  openDay(back); render();
}

function rememberClient(name, phone) {
  if (!name) return;
  let c = state.clients.find(c => c.name === name);
  if (c) { if (phone) c.phone = phone; c.lastUsedAt = new Date().toISOString(); }
  else state.clients.push({ name, phone: phone||"", lastUsedAt: new Date().toISOString() });
}
function flash(msg) { showToast(msg, "", null); }
function uid() { return (crypto.randomUUID ? crypto.randomUUID() : "id" + Date.now() + Math.random().toString(16).slice(2)); }
function esc(s) { return String(s==null?"":s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
// Имя в полосе брони: на узких полосах (1-2 дня) обрезаем по словам, а не по пикселям, чтобы не получить нечитаемый обрубок.
function shortGuestName(name, cols, fallback) {
  fallback = fallback || "Бронь";
  const full = (name || fallback).trim() || fallback;
  const first = full.split(/\s+/)[0];
  if (cols >= 3) return full;
  if (cols === 2) return first;
  return first.slice(0, 5);
}

/* ---------- Настройки ---------- */
function openSettings() {
  const s = state.settings;
  const last = s.lastBackupAt ? new Date(s.lastBackupAt).toLocaleDateString("ru-RU") : "ещё не делали";
  openSheet("Настройки", `
    <div class="set-group">
      <h3>Тема</h3>
      <div class="seg" id="themeSeg">
        <button data-t="light" class="${s.theme==='light'?'on':''}">Светлая</button>
        <button data-t="dark" class="${s.theme==='dark'?'on':''}">Тёмная</button>
        <button data-t="system" class="${s.theme==='system'?'on':''}">Система</button>
      </div>
    </div>
    <div class="set-group">
      <h3>Уведомления напоминаний</h3>
      <div class="switch-row"><span>Пробовать уведомлять</span><div class="switch ${s.notifications?'on':''}" id="sw-notif"></div></div>
      <div class="hint">Веб-уведомления работают «как получится» (особенно на iPhone). В приложении напоминания видны всегда.</div>
    </div>
    <div class="set-group">
      <h3>Данные</h3>
      <div class="set-row"><button class="btn ghost" id="exportJson">Выгрузить JSON</button><button class="btn ghost" id="importJson">Загрузить</button></div>
      <div class="set-row" style="margin-top:10px"><button class="btn ghost" id="exportCsv">Экспорт CSV</button></div>
      <div class="hint">Последний бэкап: ${last}. Делайте выгрузку периодически — это копия всех данных.</div>
      <input type="file" id="importFile" accept="application/json" style="display:none">
    </div>
    <div class="set-group" id="installGroup" style="display:none">
      <h3>Приложение</h3>
      <button class="btn primary" id="installBtn">Установить на телефон</button>
      <div class="hint">У установленного приложения данные сохраняются надёжнее.</div>
    </div>
    <div class="hint" style="text-align:center">Мой Календарь · v1.0 · все данные на устройстве</div>
  `);
  document.querySelectorAll("#themeSeg button").forEach(b => b.onclick = () => { setTheme(b.dataset.t); openSettings(); });
  const swN = document.getElementById("sw-notif");
  swN.onclick = () => { state.settings.notifications = !state.settings.notifications; if (state.settings.notifications) ensureNotifyPermission(); swN.classList.toggle("on"); save(); };
  document.getElementById("exportJson").onclick = exportJson;
  document.getElementById("exportCsv").onclick = exportCsv;
  document.getElementById("importJson").onclick = () => document.getElementById("importFile").click();
  document.getElementById("importFile").onchange = importJson;
  if (deferredPrompt) { document.getElementById("installGroup").style.display = ""; document.getElementById("installBtn").onclick = doInstall; }
}

function setTheme(t) {
  state.settings.theme = t; save();
  document.documentElement.setAttribute("data-theme", t);
  try { localStorage.setItem("mc-theme", t); } catch (e) {}
  // обновить theme-color
  const dark = t === "dark" || (t === "system" && matchMedia("(prefers-color-scheme: dark)").matches);
  document.querySelector('meta[name=theme-color]').setAttribute("content", dark ? "#121316" : "#F2F3F5");
}

/* ---------- Экспорт / импорт ---------- */
function download(name, content, mime) {
  const blob = new Blob([content], { type: mime });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = name; a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}
function exportJson() {
  state.settings.lastBackupAt = new Date().toISOString(); save();
  download(`moy-calendar-${todayStr()}.json`, JSON.stringify(state, null, 2), "application/json");
  showToast("Бэкап готов — в окошке браузера нажми «Загрузить», файл сохранится на телефон", "", null, 6000);
}
/* Раз в неделю: пробуем тихо скачать бэкап автоматически (может не сработать в Safari — это ограничение
   браузера, не наше) и в любом случае показываем напоминание с кнопкой как надёжный запасной вариант.
   Дату последнего бэкапа обновляем только по явному нажатию кнопки — иначе при тихой блокировке
   на iOS напоминание могло бы больше не появиться, хотя файл не сохранился. */
function checkWeeklyBackup() {
  const last = state.settings.lastBackupAt;
  const days = last ? (Date.now() - new Date(last).getTime()) / 86400000 : Infinity;
  if (days < 7) return;
  try { download(`moy-calendar-${todayStr()}.json`, JSON.stringify(state, null, 2), "application/json"); } catch (e) {}
  showToast("Бэкап давно не делали — сохрани файл на всякий случай", "Сделать бэкап", exportJson, 9000);
}
function exportCsv() {
  const head = ["Тип","Дата","Дата2","Время","Название/Гость","Телефон","Сумма","Комментарий"];
  const rows = state.records.map(r => {
    const type = TYPES[r.type].name;
    if (r.type === "booking") return [type, r.checkIn, r.checkOut, (r.checkInTime||""), r.guestName, r.phone, r.price, r.comment];
    if (r.type === "bath") return [type, r.date, "", `${r.fromTime||""}-${r.toTime||""}`, r.guestName, r.phone, r.price, r.comment];
    return [type, r.date, "", r.time||"", r.title, r.phone||r.contactName||"", r.amount||"", r.comment];
  });
  const csv = [head, ...rows].map(row => row.map(c => `"${String(c==null?"":c).replace(/"/g,'""')}"`).join(";")).join("\r\n");
  download(`moy-calendar-${todayStr()}.csv`, "﻿" + csv, "text/csv");
}
const DATE_RE = /^\d{4}-\d{2}-\d{2}$/;
// Битая/руками изменённая запись не должна ронять render() после импорта — отсеиваем до сохранения state.
function validRecord(r) {
  if (!r || typeof r !== "object" || !TYPES[r.type]) return false;
  if (r.type === "booking") return DATE_RE.test(r.checkIn) && DATE_RE.test(r.checkOut) && r.checkOut > r.checkIn;
  return DATE_RE.test(r.date);
}
function importJson(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data || !Array.isArray(data.records)) throw 0;
      const records = data.records.filter(validRecord);
      const skipped = data.records.length - records.length;
      try { localStorage.setItem("mc-backup", JSON.stringify(state)); } catch (_) {}
      state = Object.assign({ version:1, settings:{theme:"system",currency:"₽",notifications:false,lastBackupAt:null}, records:[], clients:[] }, data, { records });
      if (!state.clients) state.clients = [];
      save(); setTheme(state.settings.theme||"system"); render(); closeSheet();
      showToast(skipped ? `Загружено. Пропущено повреждённых записей: ${skipped}` : "Данные загружены", "", null);
    } catch (_) { showToast("Не удалось прочитать файл", "", null); }
  };
  reader.readAsText(file);
}

/* ---------- Установка PWA ---------- */
let deferredPrompt = null;
window.addEventListener("beforeinstallprompt", e => { e.preventDefault(); deferredPrompt = e; });
async function doInstall() { if (!deferredPrompt) return; deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt = null; closeSheet(); }

/* ---------- Уведомления (best-effort) ---------- */
async function ensureNotifyPermission() { try { if ("Notification" in window && Notification.permission === "default") await Notification.requestPermission(); } catch (e) {} }
function scheduleTodayReminders() {
  if (!state.settings.notifications || !("Notification" in window) || Notification.permission !== "granted") return;
  const today = todayStr(), now = new Date();
  for (const r of state.records) {
    if (!["work","event"].includes(r.type) || !r.notify || r.date !== today || !r.time) continue;
    const [h, m] = r.time.split(":").map(Number);
    const when = new Date(); when.setHours(h, m, 0, 0);
    const delay = when - now;
    if (delay > 0 && delay < 86400000) setTimeout(() => { try { new Notification("Напоминание: " + r.title); } catch (e) {} }, delay);
  }
}

/* ---------- Навигация ---------- */
const reduceMotion = () => matchMedia("(prefers-reduced-motion: reduce)").matches;
function shiftMonth(n) {
  function apply() {
    let m = view.month + n, y = view.year;
    if (m < 0) { m = 11; y--; } if (m > 11) { m = 0; y++; }
    view = { year: y, month: m }; render();
  }
  if (reduceMotion()) return apply();
  const grid = document.getElementById("grid");
  const rect = grid.getBoundingClientRect();
  const dir = n > 0 ? -1 : 1; // вперёд — старое уезжает влево, новое заходит справа; назад — наоборот

  // снимок старого месяца — реально уезжает в сторону, а не пропадает
  const clone = grid.cloneNode(true);
  clone.style.position = "fixed";
  clone.style.top = rect.top + "px";
  clone.style.left = rect.left + "px";
  clone.style.width = rect.width + "px";
  clone.style.height = rect.height + "px";
  clone.style.margin = "0";
  clone.style.zIndex = "35";
  clone.style.transition = "transform .26s cubic-bezier(.2,.8,.2,1)";
  document.body.appendChild(clone);

  apply(); // подменяем контент настоящей сетки на новый месяц

  grid.style.transition = "none";
  grid.style.transform = `translateX(${-dir * 100}%)`;
  requestAnimationFrame(() => {
    grid.style.transition = "transform .26s cubic-bezier(.2,.8,.2,1)";
    grid.style.transform = "translateX(0)";
    clone.style.transform = `translateX(${dir * 100}%)`;
  });
  setTimeout(() => {
    clone.remove();
    grid.style.transition = ""; grid.style.transform = "";
  }, 280);
}
function goToday() { const d = new Date(); view = { year: d.getFullYear(), month: d.getMonth() }; render(); }

/* ---------- Свайп по месяцам ---------- */
function initSwipe() {
  const grid = document.getElementById("grid"); let x0 = null, y0 = null;
  grid.addEventListener("touchstart", e => { x0 = e.touches[0].clientX; y0 = e.touches[0].clientY; }, { passive: true });
  grid.addEventListener("touchend", e => {
    if (x0 == null) return;
    const dx = e.changedTouches[0].clientX - x0, dy = e.changedTouches[0].clientY - y0;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) shiftMonth(dx < 0 ? 1 : -1);
    x0 = y0 = null;
  }, { passive: true });
}

/* ---------- Старт ---------- */
async function init() {
  const loaded = await dbLoad();
  if (loaded && Array.isArray(loaded.records)) {
    state = loaded; if (!state.clients) state.clients = []; if (!state.settings) state.settings = {theme:"system",currency:"₽",notifications:false,lastBackupAt:null};
    // миграция: отдельные напоминания больше не используются
    const before = state.records.length;
    state.records = state.records.filter(r => r.type !== "reminder");
    if (state.records.length !== before) save();
  }
  else { document.getElementById("onboard").classList.add("show"); }

  setTheme(state.settings.theme || "system");
  matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => { if (state.settings.theme === "system") setTheme("system"); });

  goToday();
  initSwipe();
  initSheetDrag();
  initButtonPop();
  scheduleTodayReminders();
  if (state.records.length) setTimeout(checkWeeklyBackup, 1500);

  document.getElementById("prevM").onclick = () => shiftMonth(-1);
  document.getElementById("nextM").onclick = () => shiftMonth(1);
  document.getElementById("todayBtn").onclick = goToday;
  document.getElementById("settingsBtn").onclick = openSettings;
  document.getElementById("fab").onclick = () => openTypePicker(todayStr());
  document.getElementById("scrim").onclick = closeSheet;
  document.getElementById("sheetClose").onclick = closeSheet;
  document.getElementById("onboardStart").onclick = () => { document.getElementById("onboard").classList.remove("show"); requestPersist(); };
}
init();
</script>
